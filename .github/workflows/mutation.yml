name: Mutation Testing (StrykerJS)

# ============================================================
#  Runs mutation testing on the unit test suite.
#  This is expensive (runs Jest N times where N = # mutations)
#  so we only trigger it on:
#    - Changes to the test files or source utilities
#    - Manual trigger
#    - Weekly schedule
# ============================================================

on:
  push:
    paths:
      - '__tests__/**'
      - 'stryker.config.mjs'

  workflow_run:
    workflows: ["Deploy to S3"]
    types:
      - completed
      
  workflow_dispatch:

jobs:
  mutation-test:
    name: StrykerJS Mutation Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Stryker Mutation Tests
        run: npx stryker run config/stryker.config.mjs
        env:
          # Optional: publish to stryker dashboard
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

      - name: Upload Mutation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-mutation-report
          path: reports/mutation/
          retention-days: 30

      - name: Post Mutation Summary
        if: always()
        run: |
          echo "## 🧬 Mutation Testing Results (StrykerJS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Thresholds: High ≥ 80% | Low ≥ 60% | Break < 50%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full HTML report available in the **stryker-mutation-report** artifact." >> $GITHUB_STEP_SUMMARY

  update-ci-status:
    name: Update CI Dashboard
    needs: mutation-test
    if: always()
    uses: ./.github/workflows/update-ci-status.yml
    with:
      workflow_name: "Mutation Testing (StrykerJS)"
      workflow_id:   "mutation"
      conclusion:    ${{ needs.mutation-test.result }}
      run_url:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      category:      "quality"
    secrets: inherit
