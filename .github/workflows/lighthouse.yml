name: Performance Audit (Lighthouse CI)

# ============================================================
#  CONCEPT — When does this run?
#  --------------------------------
#  This workflow is a SEPARATE quality gate that runs AFTER
#  your deploy workflow. It tests the LIVE production site,
#  not a local build — so you're measuring what real users see.
#
#  Shift Left angle: ideally you'd also run Lighthouse against
#  a preview deploy on pull requests (before merge), catching
#  regressions before they reach production.
# ============================================================

on:
  # Run after every successful deploy to production
  workflow_run:
    workflows: ["Deploy to S3"]
    types:
      - completed

  # Also allow manual trigger from GitHub UI (Actions tab)
  workflow_dispatch:

  # Weekly scheduled audit — catch degradation over time
  schedule:
    - cron: '0 0 1 * *'  # Every Monday at 9am UTC

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest

    # Only run if the deploy actually succeeded (skip on failed deploys)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}

    steps:
      # ── Step 1: Checkout code (needed for lighthouserc.js config) ──
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Step 2: Install Node & LHCI ──────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install @lhci/cli
        run: npm install -g @lhci/cli

      # ── Step 3: Wait for CloudFront to fully propagate ───────────
      # CloudFront invalidations can take 30-60s to propagate globally
      - name: Wait for CloudFront Propagation
        run: |
          echo "Waiting 45s for CloudFront to propagate..."
          sleep 45
          echo "Verifying site is reachable..."
          curl -sSf https://d2kmkdebgfkxyh.cloudfront.net/ > /dev/null
          echo "Site is up. Running audits."

      # ── Step 4: Run Lighthouse CI audits ─────────────────────────
      - name: Run Lighthouse CI
        run: lhci autorun --config=config/lighthouserc.js
        env:
          # If you set up a private LHCI server later, add token here:
          # LHCI_TOKEN: ${{ secrets.LHCI_TOKEN }}
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Posts results as PR status

      # ── Step 5: Upload HTML reports as artifacts ─────────────────
      # Even if the audit fails the thresholds, you get the full report
      - name: Upload Lighthouse Reports
        if: always()  # Upload even on failure so you can diagnose
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ github.run_number }}
          path: .lighthouseci/
          retention-days: 30

      # ── Step 6: Post summary to GitHub job summary ───────────────
      - name: Post Lighthouse Summary
        if: always()
        run: |
          echo "## 🔦 Lighthouse CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Page | Performance | Accessibility | Best Practices | SEO |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|---------------|----------------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Homepage | See artifact | See artifact | See artifact | See artifact |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 Full HTML reports available in the **lighthouse-reports** artifact above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎯 **Thresholds:** Performance ≥ 80 | Accessibility ≥ 90 | Best Practices ≥ 90" >> $GITHUB_STEP_SUMMARY

  update-ci-status:
    name: Update CI Dashboard
    needs: lighthouse
    if: always()
    uses: ./.github/workflows/update-ci-status.yml
    with:
      workflow_name: "Lighthouse Performance Audit"
      workflow_id:   "lighthouse"
      conclusion:    ${{ needs.lighthouse.result }}
      run_url:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      category:      "quality"
    secrets: inherit