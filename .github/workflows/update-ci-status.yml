name: Update CI Dashboard Status

# ============================================================
#  REUSABLE WORKFLOW — called by all other workflows as their
#  final job. Writes one JSON file to S3 that the website
#  reads for both the Live Pipeline Status cards AND the
#  QA Metrics Dashboard numbers.
#
#  S3 path: s3://<bucket>/ci-status/dashboard.json
#  CDN URL: https://d2kmkdebgfkxyh.cloudfront.net/ci-status/dashboard.json
# ============================================================

on:
  workflow_call:
    inputs:
      workflow_name:
        description: 'Human-readable workflow name (shown in dashboard)'
        required: true
        type: string
      workflow_id:
        description: 'Unique key for this workflow (no spaces)'
        required: true
        type: string
      conclusion:
        description: 'Outcome: success | failure | cancelled | skipped'
        required: true
        type: string
      run_url:
        description: 'Direct URL to this specific workflow run'
        required: true
        type: string
      category:
        description: 'Dashboard category: deploy | test | quality | security'
        required: false
        type: string
        default: 'test'
      tests_total:
        description: 'Total number of tests in this suite (0 = not a test workflow)'
        required: false
        type: number
        default: 0
      tests_passed:
        description: 'Number of passing tests'
        required: false
        type: number
        default: 0
      tests_failed:
        description: 'Number of failing tests'
        required: false
        type: number
        default: 0
      duration_seconds:
        description: 'Workflow duration in seconds (for avg runtime metric)'
        required: false
        type: number
        default: 0

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Update CI Dashboard JSON in S3
        run: |
          BUCKET="${{ secrets.AWS_S3_BUCKET }}"
          KEY="ci-status/dashboard.json"
          TMPFILE="/tmp/dashboard.json"

          aws s3 cp "s3://$BUCKET/$KEY" "$TMPFILE" 2>/dev/null \
            || echo '{"workflows":{},"lastUpdated":""}' > "$TMPFILE"

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          python3 << PYEOF
          import json

          with open("$TMPFILE") as f:
              data = json.load(f)

          if "workflows" not in data:
              data["workflows"] = {}

          data["workflows"]["${{ inputs.workflow_id }}"] = {
              "name":          "${{ inputs.workflow_name }}",
              "id":            "${{ inputs.workflow_id }}",
              "category":      "${{ inputs.category }}",
              "conclusion":    "${{ inputs.conclusion }}",
              "runNumber":     ${{ github.run_number }},
              "runUrl":        "${{ inputs.run_url }}",
              "commitSha":     "${SHORT_SHA}",
              "updatedAt":     "$TIMESTAMP",
              "testsTotal":    ${{ inputs.tests_total }},
              "testsPassed":   ${{ inputs.tests_passed }},
              "testsFailed":   ${{ inputs.tests_failed }},
              "durationSecs":  ${{ inputs.duration_seconds }}
          }

          data["lastUpdated"] = "$TIMESTAMP"

          with open("$TMPFILE", "w") as f:
              json.dump(data, f, indent=2)

          print(f"Updated: ${{ inputs.workflow_id }} → ${{ inputs.conclusion }}")
          PYEOF

          aws s3 cp "$TMPFILE" "s3://$BUCKET/$KEY" \
            --content-type "application/json" \
            --cache-control "no-cache, no-store, must-revalidate"

          echo "✅ dashboard.json updated"
