name: Deploy to S3

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll Site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Deploy to S3
        run: |
          # Sync all site files EXCEPT the images folder.
          # Images live permanently in S3 — uploaded once via scripts/upload-images.sh.
          # Excluding them here prevents --delete from wiping them on every deploy.
          aws s3 sync ./_site s3://${{ secrets.AWS_S3_BUCKET }} \
            --delete \
            --exclude "assets/img/*"

      - name: Invalidate CloudFront (non-image assets only)
        run: |
          # Only invalidate HTML/CSS/JS — images are immutable on the CDN.
          # This makes invalidation faster and reduces CloudFront costs.
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.DISTRIBUTION_ID }} \
            --paths "/*.html" "/assets/css/*" "/assets/js/*" "/assets/html/*" "/"
