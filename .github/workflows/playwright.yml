name: Playwright Cross-Browser Tests

on:
  workflow_run:
    workflows: ["Deploy to S3"]
    types: [completed]
  workflow_dispatch:

jobs:
  playwright:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    strategy:
      fail-fast: false 
      matrix:
        # These names match exactly what is in your playwright.config.ts
        project: [chromium, firefox, webkit, mobile-chrome]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        # Installs only the browser needed for this specific matrix job to save time
        run: npx playwright install --with-deps ${{ matrix.project == 'mobile-chrome' && 'chromium' || matrix.project }}

      - name: Run Playwright Tests
        # FIXED: Uses --project instead of --browser to support your config file
        run: npx playwright test --config config/playwright.config.ts --project=${{ matrix.project }}
        env:
          CI: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Videos (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos-${{ matrix.project }}
          path: test-results/
          retention-days: 7
  update-ci-status:
    name: Update CI Dashboard
    needs: playwright
    if: always()
    uses: ./.github/workflows/update-ci-status.yml
    with:
      workflow_name: "Playwright Cross-Browser Tests"
      workflow_id:   "playwright"
      conclusion:    ${{ needs.playwright.result }}
      run_url:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      category:      "test"
    secrets: inherit
