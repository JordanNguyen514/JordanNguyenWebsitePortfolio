name: API Monitoring & Synthetics

on:
  workflow_run:
    workflows: ["Deploy to S3"]
    types:
      - completed
  workflow_dispatch:

jobs:
  synthetic-checks:
    name: Synthetic API Health Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Check 1: CloudFront CDN ───────────────────────────────
      - name: 🌐 Check — CloudFront site is reachable
        id: check_site
        run: |
          echo "Checking: https://d2kmkdebgfkxyh.cloudfront.net/"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code},%{time_total}" \
            --max-time 15 \
            "https://d2kmkdebgfkxyh.cloudfront.net/")
          HTTP_CODE=$(echo $RESPONSE | cut -d',' -f1)
          TIME=$(echo $RESPONSE | cut -d',' -f2)
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "response_time=$TIME" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ FAIL: CloudFront returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ PASS: CloudFront is up (${TIME}s)"

      # ── Check 2: Email Form API ─────────────────────────────────────────────
      - name: 📧 Check - Email Form API (POST)
        id: check_email_api
        run: |
          echo "Checking: Email Form Lambda"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-synthetic-monitor: true" \
            -d '{"senderName": "Synthetic Monitor", "senderEmail": "monitor@test.com", "subject": "Health Check", "message": "Automated verification from CI/CD"}' \
            "https://88vzig52sl.execute-api.ca-central-1.amazonaws.com/prod/send")
          
          echo "Status: $HTTP_CODE"
          # Only accept 200 OK as success
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ PASS: Email API is reachable (HTTP $HTTP_CODE)"
          else
            echo "❌ FAIL: Email API returned HTTP $HTTP_CODE"
            exit 1
          fi

      # ── Check 3: Key pages ────────────────────────────────────
      - name: 📄 Check — Key pages return 200
        run: |
          PAGES=(
            "https://d2kmkdebgfkxyh.cloudfront.net/assets/html/jobs.html"
            "https://d2kmkdebgfkxyh.cloudfront.net/assets/html/certifications.html"
            "https://d2kmkdebgfkxyh.cloudfront.net/assets/html/sdet.html"
          )
          FAILED=0
          for URL in "${PAGES[@]}"; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ $URL → $HTTP_CODE"
            else
              echo "❌ $URL → $HTTP_CODE"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then exit 1; fi

      - name: Post Monitoring Summary
        if: always()
        run: |
          echo "## 🔬 Synthetic Monitor Results — $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront CDN | ${{ steps.check_site.outcome == 'success' && '✅ Up' || '❌ Down' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Email Form API | ${{ steps.check_email_api.outcome == 'success' && '✅ Up' || '❌ Down' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Response time (homepage): ${{ steps.check_site.outputs.response_time }}s" >> $GITHUB_STEP_SUMMARY

  update-ci-status:
    name: Update CI Dashboard
    needs: synthetic-checks
    if: always()
    uses: ./.github/workflows/update-ci-status.yml
    with:
      workflow_name: "API Monitoring & Synthetics"
      workflow_id:   "synthetics"
      conclusion:    ${{ needs.synthetic-checks.result }}
      run_url:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      category:      "quality"
    secrets: inherit
