name: Post-Deployment UI Tests

on:
  workflow_run:
    # Ensure this matches the 'name:' defined in your deploy.yml exactly
    workflows: ["Deploy to S3"] 
    types:
      - completed

jobs:
  e2e-tests:
    # Only run if the deployment workflow actually succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cypress Run (CloudFront Production)
        # This official action handles 'npm install' and 'cypress install' 
        # with correct Linux permissions automatically.
        uses: cypress-io/github-action@v6
        env:
          APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
          APPLITOOLS_BATCH_ID: "run-${{ github.run_id }}"
        with:
          install: true
          browser: chrome
          config: baseUrl=https://d2kmkdebgfkxyh.cloudfront.net/
          wait-on: 'https://d2kmkdebgfkxyh.cloudfront.net/'
          wait-on-timeout: 120
          # Exclude visual_regression — requires Applitools API key and
          # committed Linux baseline PNGs; not suitable for every deploy run.
          spec: >-
            cypress/e2e/autoHeal_demo.cy.js,
            cypress/e2e/contact_form_spec.cy.js,
            cypress/e2e/email_form_spec.cy.js,
            cypress/e2e/internships_page_spec.cy.js,
            cypress/e2e/jobs_page_spec.cy.js,
            cypress/e2e/smoke.cy.js,
            cypress/e2e/submissions_navigation_spec.cy.js

      - name: Upload Test Evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      - name: Upload Test Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos

  update-ci-status:
    name: Update CI Dashboard
    needs: e2e-tests
    if: always()
    uses: ./.github/workflows/update-ci-status.yml
    with:
      workflow_name: "Post-Deployment UI Tests (Cypress)"
      workflow_id:   "cypress-e2e"
      conclusion:    ${{ needs.e2e-tests.result }}
      run_url:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      category:      "test"
      # 16 = Cypress tests excluding visual_regression (Applitools)
      
      tests_total:   16
      tests_passed:  ${{ needs.e2e-tests.result == 'success' && 16 || 0 }}
      tests_failed:  ${{ needs.e2e-tests.result == 'failure' && 16 || 0 }}
    secrets: inherit
