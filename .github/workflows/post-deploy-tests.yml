name: Post-Deployment UI Tests

on:
  workflow_run:
    # Ensure this matches the 'name:' defined in your deploy.yml exactly
    workflows: ["Deploy to S3"] 
    types:
      - completed

jobs:
  e2e-tests:
    # Only run if the deployment workflow actually succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        # Using 'npm install' to bypass the 'npm ci' lockfile error seen in your logs
        run: npm install

      - name: Cypress Run (CloudFront Production)
        uses: cypress-io/github-action@v6
        # Map secrets to environment variables so the Applitools plugin can find them
        env:
          APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
          APPLITOOLS_BATCH_ID: ${{ github.run_id }}
        with:
          # Tell the action not to run install again since we just did it above
          install: false
          browser: chrome
          # RESTORED ORIGINAL URL:
          config: baseUrl=https://d2kmkdebgfkxyh.cloudfront.net/
          # Ensures CloudFront is serving the site before starting tests
          wait-on: 'https://d2kmkdebgfkxyh.cloudfront.net/'
          wait-on-timeout: 120 

      - name: Upload Test Evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      - name: Upload Test Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
