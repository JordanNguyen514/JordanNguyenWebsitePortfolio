version: 0.2
phases:
  install:
    commands:
      # Install Node.js dependencies
      - npm install
      # Install Cypress CLI
      - npm install cypress --save-dev
      # Install required Linux dependencies for the headless browser
      - apt-get update && apt-get install -y libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libgconf-2-4 libnss3 libxss1 libasound2 libxtst6 xauth xvfb
      # FIX: Grant execute permissions to the cypress binary
      - chmod +x node_modules/cypress/bin/cypress
  build:
    commands:
      # FIX: Run cypress by calling node directly on the CLI script, with HTTPS base URL
      - node node_modules/cypress/bin/cypress run --config baseUrl=https://d2kmkdebgfkxyh.cloudfront.net
artifacts:
  # Primary artifacts are the test results we set up in CodeBuild
  files:
    - 'cypress/screenshots/**/*'
    - 'cypress/videos/**/*'
    - 'buildspec.yml'
  
  # Secondary artifacts are the actual website files inside the 'dist' folder
  secondary-artifacts:
    - ArtifactIdentifier: WebsiteFiles
      # All files within the dist directory should be packaged
      files:
        - '**/*'
      base-directory: 'dist'