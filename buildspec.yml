version: 0.2
phases:
  install:
    runtime-versions:
      ruby: latest # Ensures Ruby is available
      nodejs: latest # Ensures Node.js is available
    commands:
      # Install Node.js dependencies (for Cypress/JS projects)
      - npm install
      # Install required Linux dependencies for the headless browser (for Cypress/Selenium)
      - apt-get update && apt-get install -y libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libgconf-2-4 libnss3 libxss1 libasound2 libxtst6 xauth xvfb
      # Install Jekyll and Ruby dependencies using Bundler
      - gem install bundler
      - bundle install
  build:
    commands:
      # Run the Jekyll build command to generate static files into the _site folder
      - bundle exec jekyll build
      # FIX: Run tests using the npm run script (if applicable)
      #- npm run test
  post_build:
    commands:
      # Sync the generated site files (_site folder) to your S3 bucket
      # Removed the offending --acl public-read flag
      - aws s3 sync --delete _site/ s3://my-private-automation-target-2025 --cache-control max-age=604800
      # The CloudFront invalidation command was removed from here. 
      # It will be handled by a separate Lambda stage in CodePipeline.

artifacts:
  # Primary artifacts are test results (Cypress screenshots/videos)
  files:
    - 'cypress/screenshots/**/*'
    - 'cypress/videos/**/*'
  # Secondary artifacts are the actual website files inside the '_site' folder
  secondary-artifacts:
    WebsiteFiles:
      # All files within the _site directory should be packaged
      files:
        - '**/*'
      base-directory: '_site'