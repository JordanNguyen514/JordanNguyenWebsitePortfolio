version: 0.2
phases:
  install:
    commands:
      # Install Node.js dependencies
      - npm install
      # Install Cypress CLI
      - npm install cypress --save-dev
      # Install required Linux dependencies for the headless browser (from previous step)
      - apt-get update && apt-get install -y libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libgconf-2-4 libnss3 libxss1 libasound2 libxtst6 xauth xvfb
      # FIX: Grant execute permissions to the cypress binary
      - chmod +x node_modules/cypress/bin/cypress
  build:
    commands:
      # Run your Cypress tests against your live CloudFront URL
      - npx cypress run --config baseUrl=d2kmkdebgfkxyh.cloudfront.net
artifacts:
  files:
    - 'cypress/screenshots/**/*'
    - 'cypress/videos/**/*'
    - 'buildspec.yml'