version: 0.2
phases:
  install:
    commands:
      # Install Node.js dependencies
      - npm install
      # Install required Linux dependencies for the headless browser
      - apt-get update && apt-get install -y libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libgconf-2-4 libnss3 libxss1 libasound2 libxtst6 xauth xvfb
  build:
    commands:
      # Create the required 'dist' directory
      - mkdir dist
      # Move all website source files into the 'dist' directory so they are packaged
      - cp -r * dist/
      # FIX: Run tests using the npm run script which handles permissions
      - npm run test
artifacts:
  # Primary artifacts are the test results we set up in CodeBuild
  files:
    - 'cypress/screenshots/**/*'
    - 'cypress/videos/**/*'
  # Secondary artifacts are the actual website files inside the 'dist' folder
  secondary-artifacts:
    WebsiteFiles:
      # All files within the dist directory should be packaged
      files:
        - '**/*'
      base-directory: 'dist'