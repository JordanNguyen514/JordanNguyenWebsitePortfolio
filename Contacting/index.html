---
layout: default
css_file: "/assets/css/Contacting.css"
---
  <div class="ContactForm">
    <div class="panel panel-primary">
      <div class="ContactForm1">
        <h1>Contact Form</h1>
      </div>
      <div class="panel-body">
        <!-- NOTE: S3 only supports static sites. The PHP form action below will not work on AWS S3 -->
        <!-- You would need to use AWS Lambda/API Gateway/SES to enable form submission -->
        <form id="contactForm">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input
              type="text"
              class="form-control"
              id="firstName"
              name="firstName"
              required
              maxlength="10"
            />
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input
              type="text"
              class="form-control"
              id="lastName"
              name="lastName"
              required
            />
          </div>
          <div class="form-group">
            <label for="Purpose">Purpose of Contact</label>
            <div>
              <label for="Academics" class="radio-inline">
                <input
                  type="radio"
                  name="Purpose"
                  value="A"
                  id="Academics"
                  required
                />Academics</label>
              <label for="Professional" class="radio-inline">
                <input
                  type="radio"
                  name="Purpose"
                  value="P"
                  id="Professional"
                  required
                />Professional</label>

              <label for="others" class="radio-inline"
                ><input
                  type="radio"
                  name="Purpose"
                  value="O"
                  id="others"
                  required
                />Other Reason</label>
            </div>
          </div>
          <div class="form-group">
            <label for="email">Your Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              required
            />
          </div>

          <div class="form-group">
            <label for="number">Your Phone Number</label>
            <input
              type="tel"
              class="form-control"
              id="number"
              name="number"
              maxlength="10"
              required
            />
          </div>

          <div class="form-group">
            <label for="Message">Leave a short Message</label>
            <div>
            <textarea
              type="text"
              class="form-control"
              id="Message"
              name="Message"
              required
              maxlength="140" rows="5"></textarea>
          </div>
          </div>

          <input type="submit" class="SubBtn" value="Submit" />
        </form>
        <div id="formResponse" style="margin-top: 10px; font-weight: bold;"></div>
      </div>
    </div>
  </div>

  <!-- Link the new JavaScript file here -->
  <script src="{{ '/assets/js/contact_form_handler.js' | relative_url }}" defer></script>
