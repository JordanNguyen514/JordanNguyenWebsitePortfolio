<!DOCTYPE html>
<html lang="en" dir ="ltr">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content =
    "width=device-width, initial-scale=1">

    <meta name="description" content =
    "who is Jordan?">

    <title> Jordan 1st Page </title>

    <link rel = "stylesheet" href = "{{ '/assets/css/main.css' | relative_url }}">
    <link rel = "stylesheet" href = "{{ '/assets/css/FirstPage.css' | relative_url }}">
    <link rel="icon" type="image/x-icon" href="{{ '/assets/img/favicon.ico' | relative_url }}">
    <link rel="shortcut icon" type="image/x-icon" href="{{ '/assets/img/favicon.ico' | relative_url }}">
    <script src="{{ '/assets/js/jquery-3.5.0.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/tracker.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/analytics-dashboard.js' | relative_url }}" defer></script>

    {% if page.css_file %}
      <link rel="stylesheet" href="{{ page.css_file | relative_url }}">
    {% endif %}

  </head>

  <body>
     <div class="topnav">

            <!-- Added tracking attributes -->
            <a href="{{ '/' | relative_url }}" data-event-category="TopNav" data-event-action="Click_Home"> Home </a>
            
            <div class="nav-dropdown">
              <button class="nav-dropdown-btn"> Browse
              </button>
                <div class="dropdown-menu">
                  <!-- Added tracking attributes -->
                  <a href="{{ '/assets/html/jobs.html' | relative_url }}" data-event-category="TopNav" data-event-action="Click_Jobs">Jobs</a>
                  <a href="{{ '/assets/html/internships.html' | relative_url }}" data-event-category="TopNav" data-event-action="Click_Internships">Internships</a>
                  <a href="{{ '/assets/html/academic.html' | relative_url }}" data-event-category="TopNav" data-event-action="Click_Academics">Academics</a>
                  <a href="{{ '/assets/html/certifications.html' | relative_url }}" data-event-category="TopNav" data-event-action="Click_Certifications">Certifications</a>
                  <a href="{{ '/OtherSection/index.html' | relative_url }}" data-event-category="TopNav" data-event-action="Click_OtherInterests">Other interests</a>
                </div>
            </div>
            
            <div class="nav-dropdown">
              <button class="nav-dropdown-btn"> Contact
              </button>
                <div class="dropdown-menu">
                  <!-- Added tracking attributes -->
                  <a href="{{ '/assets/html/contacting.html' | relative_url }}" data-event-category="TopNav" data-event-action="Click_ContactForm">Contact Form</a>
                  <a href="{{ '/assets/html/emailing.html' | relative_url }}" data-event-category="TopNav" data-event-action="Click_EmailForm">Email Form</a>
                  <a href="{{ '/assets/html/submissions.html' | relative_url }}" data-event-category="TopNav" data-event-action="Click_ViewSubmissions">View Submissions</a>
                </div>
            </div>
            <a id="time"></a>
            <a id="visitorCounter">Visitors: --</a>
      </div>

      <button id="backToTopBtn" title="Go to top">↑</button>

      {{ content }}

      <footer class="site-footer">
      <div class="footer-container">
        <p>&copy; {{ site.time | date: "%Y" }} Jordan Nguyen. All rights reserved.</p>
        <p>Built with Jekyll and hosted on AWS.</p>
      </div>
    </footer>

  </body>

</html>
